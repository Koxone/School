<button id="botonadv">Advanced Search</button>

<script>
    document.getElementById('botonadv').addEventListener('click', function (event) {
        event.preventDefault(); // Prevenir el comportamiento predeterminado del botón

        // Obtener valores de los campos
        const allWords = document.getElementById('all-words')?.value || '';
        const exactWord = document.getElementById('exact-word')?.value || '';
        const anyWords = document.getElementById('any-words')?.value || '';
        const noneWords = document.getElementById('none-words')?.value || '';
        const numbersFrom = document.getElementById('numbers-range')?.value || '';
        const numbersTo = document.getElementById('numbers-range-to')?.value || '';
        const language = document.getElementById('language')?.value || '';
        const region = document.getElementById('region')?.value || '';
        const lastUpdate = document.getElementById('last-update')?.value || '';
        const siteDomain = document.getElementById('site-domain')?.value || '';
        const termsAppearing = document.getElementById('terms-appearing')?.value || '';
        const fileType = document.getElementById('file-type')?.value || '';

        // Construir la URL para Google Advanced Search
        const url = new URL('https://www.google.com/search');
        if (allWords) url.searchParams.append('as_q', allWords);
        if (exactWord) url.searchParams.append('as_epq', exactWord);
        if (anyWords) url.searchParams.append('as_oq', anyWords);
        if (noneWords) url.searchParams.append('as_eq', noneWords);
        if (numbersFrom && numbersTo) url.searchParams.append('as_nlo', numbersFrom);
        if (numbersFrom && numbersTo) url.searchParams.append('as_nhi', numbersTo);
        if (language) url.searchParams.append('lr', `lang_${language}`);
        if (region) url.searchParams.append('cr', `country${region}`);
        if (lastUpdate) url.searchParams.append('as_qdr', lastUpdate);
        if (siteDomain) url.searchParams.append('as_sitesearch', siteDomain);
        if (termsAppearing) url.searchParams.append('as_occt', termsAppearing);
        if (fileType) url.searchParams.append('as_filetype', fileType);

        // Redirigir al resultado de búsqueda
        window.location.href = url.toString();
    });
</script>
