<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Link para el CSS -->
    <link rel="stylesheet" href="google.css">
    <!-- Termina link de CSS -->

    <title>Google Search</title>
    
</head>

<body>
    <!--Links Externos-->
    <a id="link1" href="images.html" target="_blank">Google Image Search</a>
    <a id="link2" href="advanced.html" target="_blank">Google Advanced Search</a>

<!--Contenedor-->

<div class="center-container">
    <!-- Logo de Google -->
    <img id="google-logo" src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google logo">

    <!-- Contenedor de búsqueda -->
    <div class="search-container">
        <form action="https://www.google.com/search" method="get">
        <input id="caja" type="text" placeholder="Search" name="q">
        <img id="lupa" src="https://cdn-icons-png.flaticon.com/512/622/622669.png" alt="Lupa">
    </div>
    <!-- Botones -->
    <div class="button-container">
        <button id="search" type="submit">Google Search</button>
        <button id="lucky" type="submit" name="btnI" value="I'm Feeling Lucky">I'm Feeling Lucky</button>
    </div>
</div>
</form>

    


</body>
</html>
